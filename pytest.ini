[pytest]
addopts = -v --reruns 2 --screenshot=only-on-failure --tracing=retain-on-failure --html=reports/report.html --self-contained-html --alluredir=allure-results --clean-alluredir -q
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: 冒烟测试
    regression: 回归测试